location = /todo {
    return 301 /todo/;
}

location ~ ^/todo/api/auth/(login|refresh|register|reset-password/confirm)$ {
    # Low-overhead brute-force throttling on sensitive unauth endpoints.
    limit_req zone=todo_auth_per_ip burst=20 nodelay;
    limit_req_status 429;
    add_header Retry-After 60 always;

    rewrite ^/todo/(.*)$ /$1 break;
    proxy_pass http://todo-backend:80;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /todo;
    proxy_set_header Connection "";

    proxy_read_timeout 300s;
}

location /todo/ {
    proxy_pass http://todo-backend:80/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /todo;
    proxy_set_header Connection "";

    proxy_read_timeout 300s;
}
