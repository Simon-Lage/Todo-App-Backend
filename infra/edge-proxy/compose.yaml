---
services:
  reverse-proxy:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile
    restart: unless-stopped
    env_file:
      - ./compose.env
    ports:
      - target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/routes:/etc/nginx/routes:ro
      - ./nginx/bootstrap-certs.sh:/docker-entrypoint.d/10-bootstrap-certs.sh:ro
      - certbot_webroot:/var/www/certbot:ro
      - active_certs:/etc/nginx/certs
    command: >-
      /bin/sh -c "
      while :; do
        sleep $${NGINX_RELOAD_INTERVAL_SECONDS:-300};
        nginx -s reload || true;
      done &
      exec nginx -g 'daemon off;'
      "
    networks:
      - edge

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      - reverse-proxy
    env_file:
      - ./compose.env
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - active_certs:/certs
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
    command: /bin/sh /entrypoint.sh
    networks:
      - edge

volumes:
  certbot_data:
  certbot_webroot:
  active_certs:

networks:
  edge:
    external: true
    name: edge
